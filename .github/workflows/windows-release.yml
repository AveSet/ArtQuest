name: Windows Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    env:
      ARTQUEST_GOOGLE_CLIENT_ID: ${{ secrets.ARTQUEST_GOOGLE_CLIENT_ID }}
      ARTQUEST_GOOGLE_CLIENT_SECRET: ${{ secrets.ARTQUEST_GOOGLE_CLIENT_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Validate quest JSON
        run: npm run validate:quests

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Web E2E and accessibility
        run: npm run test:e2e

      - name: Electron smoke test
        run: npm run test:e2e:electron

      - name: Build Windows installers and portable
        run: npm run electron:build:portable

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ArtQuest-Windows
          path: |
            dist-build/*Setup*.exe
            dist-build/*.zip
            dist-build/ArtQuest-Portable.exe
